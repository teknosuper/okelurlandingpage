<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>APLIKASI OKE LUR - Desa Ketitang Lor</title>
    <meta
      name="description"
      content="Akses cepat ke aplikasi OKE LUR dan portal resmi Desa Ketitang Lor."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Instrument+Serif:ital@0;1&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="screen">
      <section class="panel" aria-label="Akses utama">
        <div class="brand">
          <div class="logo-shell">
            <img class="logo" src="logookelur.png" alt="Logo OKE LUR" />
          </div>
          <p class="eyebrow">Desa Ketitang Lor</p>
        </div>

        <div class="intro">
          <h1>Layanan Desa Digital Jadi Lebih Mudah</h1>
          <p class="lead">
            Platform OKE LUR mempermudah warga Desa Ketitang Lor dalam
            mengakses administrasi dan layanan publik secara online.
          </p>
        </div>

        <div class="actions">
          <a class="action action-primary" href="https://web.ketitanglor.id/layanan-mandiri/masuk">
            <span class="action-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" role="img">
                <path d="M12 3a4 4 0 1 1 0 8 4 4 0 0 1 0-8Zm0 10c4.42 0 8 2.24 8 5v1H4v-1c0-2.76 3.58-5 8-5Z" />
              </svg>
            </span>
            <span class="action-copy">
              <strong>Masuk Aplikasi OKE LUR</strong>
              <small>Layanan mandiri dan administrasi warga</small>
            </span>
            <span class="action-arrow" aria-hidden="true">
              <svg viewBox="0 0 24 24" role="img">
                <path d="M13.29 5.29a1 1 0 0 1 1.42 0l6 6a1 1 0 0 1 0 1.42l-6 6a1 1 0 1 1-1.42-1.42L17.59 13H4a1 1 0 1 1 0-2h13.59l-4.3-4.29a1 1 0 0 1 0-1.42Z" />
              </svg>
            </span>
          </a>

          <a class="action" href="https://web.ketitanglor.id">
            <span class="action-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" role="img">
                <path d="M3 5h18v14H3V5Zm2 2v10h14V7H5Zm2 2h4v2H7V9Zm0 4h10v2H7v-2Z" />
              </svg>
            </span>
            <span class="action-copy">
              <strong>Portal Desa</strong>
              <small>Informasi umum dan pembaruan desa</small>
            </span>
            <span class="action-arrow" aria-hidden="true">
              <svg viewBox="0 0 24 24" role="img">
                <path d="M13.29 5.29a1 1 0 0 1 1.42 0l6 6a1 1 0 0 1 0 1.42l-6 6a1 1 0 1 1-1.42-1.42L17.59 13H4a1 1 0 1 1 0-2h13.59l-4.3-4.29a1 1 0 0 1 0-1.42Z" />
              </svg>
            </span>
          </a>
        </div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
